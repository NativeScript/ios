on:
  push:
    branches:
      - main # -> prerelease published under the "next" dist-tag
    tags:
      - "v*" # -> release published under the "latest" dist-tag
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to cut, e.g. 9.1.0 (creates tag v<version> and publishes 'latest'). Leave empty for a manual 'next' build."
        required: false
        default: ""

env:
  NPM_TAG: "next"
  XCODE_VERSION: "^15.0"

# Minimal default token permissions for every job. Jobs that need more declare it
# locally (github-release: contents:write; publish: id-token:write). Cross-repo
# writes to ios-spm use a GitHub App token, not GITHUB_TOKEN.
permissions:
  contents: read

# The runtime xcframeworks are no longer shipped inside the npm packages. Each
# build publishes them as GitHub Release assets and points the SwiftPM manifest
# (github.com/NativeScript/ios-spm) at them via binaryTarget(url:checksum:). The
# slim npm package only carries the Xcode project template + metadata generator.
#
# Flow: setup → build (ios, visionos) → test → github-release (assets) →
#       spm-update (generate manifest + tag ios-spm) → publish (npm) → verify-spm
#
# The release half (github-release, spm-update, publish, verify-spm) is gated on
# repo variable ENABLE_SPM_RELEASE. Until it is 'true' (and the ios-spm App
# credentials are set), the workflow runs setup/build/test only and publishes NOTHING — so the
# slim package can never ship before its matching ios-spm tag exists. Turn the
# variable on as part of the cutover.
jobs:
  setup:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      npm_version: ${{ steps.out.outputs.NPM_VERSION }}
      npm_tag: ${{ steps.out.outputs.NPM_TAG }}
      build_matrix: ${{ steps.out.outputs.BUILD_MATRIX }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          # setup-node v6 enables dependency caching by default when it
          # detects a package manager — a cache-poisoning vector, worst in the
          # jobs that mint App tokens or publish. Disabled on every setup-node
          # step in this workflow (also keeps pre-v6 behavior).
          package-manager-cache: false
      - name: Install deps for version scripts
        run: npm install --no-audit --no-fund
      - name: Compute version and tag
        id: out
        env:
          # env indirection keeps the dispatch input out of shell interpolation
          INPUT_VERSION: ${{ inputs.version }}
        run: node ./scripts/resolve-release.mjs --version "$INPUT_VERSION"

  build:
    name: Build ${{ matrix.target }}
    runs-on: macos-14
    needs: setup
    strategy:
      fail-fast: false
      # Computed in `setup`: ios always; visionos only for real releases
      # (npm_tag != "next"), never for the rolling "next" channel. Each entry
      # carries `target` (package identity, @nativescript/<target>) and `script`
      # (the npm build script; note the vision script is build-vision).
      matrix: ${{ fromJSON(needs.setup.outputs.build_matrix) }}
    env:
      NPM_VERSION: ${{ needs.setup.outputs.npm_version }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: ${{env.XCODE_VERSION}}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: true
          persist-credentials: false # disable to prevent leaking credentials to build scripts
      - name: LLVM cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ./llvm
          key: ${{ hashFiles('download_llvm.sh') }}
      - uses: ./.github/actions/setup-build-env
        with:
          registry-url: "https://registry.npmjs.org"
      - name: Set package version
        run: npm version $NPM_VERSION --no-git-tag-version --allow-same-version
      - name: Build (${{ matrix.target }})
        # remote mode: the published package embeds no binaries and pins
        # github.com/NativeScript/ios-spm at this version instead (the
        # github-release + spm-update jobs make that pin resolvable).
        env:
          # env indirection keeps matrix values out of shell interpolation
          BUILD_SCRIPT: ${{ matrix.script }}
        run: npm run "$BUILD_SCRIPT" -- --spm-mode=remote
      - name: Upload npm package artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: npm-package-${{ matrix.target }}
          path: dist/nativescript-*-${{ env.NPM_VERSION }}.tgz
      - name: Upload SwiftPM artifacts (xcframework zips + checksums)
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: spm-artifacts-${{ matrix.target }}
          path: dist/artifacts/*
      - name: Upload dSYMs artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: dSYMs-${{ matrix.target }}
          path: dist/dSYMs

  test:
    name: Test
    # Runtime suite runs on Xcode 26 / iOS 26 — the combo verified passing
    # locally. iOS 17.x is intentionally NOT used: a worker-teardown stress spec
    # deadlocks the JS thread there (hangs the whole suite), a bug we don't chase
    # on an OS we don't ship-test. Pinned (not latest-stable) so the runtime suite
    # is deterministic; bump to "27" when Xcode 27 ships.
    runs-on: macos-15
    needs: build
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: ${{env.XCODE_VERSION}}
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          persist-credentials: false # disable to prevent leaking credentials to build scripts
      - name: LLVM cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ./llvm
          key: ${{ hashFiles('download_llvm.sh') }}
      - uses: ./.github/actions/setup-build-env
        with:
          install-test-tools: "true"
      - name: Prepare
        run: npm run setup-ci
      - name: Prepare test folder
        run: |
          mkdir -p dist-test
          echo TEST_FOLDER=$(pwd)/dist-test >> $GITHUB_ENV
      - name: Xcode Tests
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        # try to run the tests with xcpretty. If it fails then try again without xcpretty twice for better log output
        # the xcode tests are a bit flaky and they should never fail on this step, as this step only collects the JS test results as junit xml
        with:
          # Build (~10m) + the runtime suite's report-wait (now up to 10m, see
          # TestRunnerTests.swift) need more than 20m headroom per attempt.
          timeout_minutes: 40
          max_attempts: 2
          command: |
            set -o pipefail
            # Background native-stack sampler: if the runtime suite deadlocks, the
            # test-diagnostics artifact gets per-thread backtraces of the hung app
            # (the JS console never reaches os_log, so this is our only window into
            # the lock cycle). Killed via trap when xcodebuild returns.
            bash .github/scripts/sample-hung-app.sh "$TEST_FOLDER/diagnostics" &
            SAMPLER_PID=$!
            trap 'kill "$SAMPLER_PID" 2>/dev/null || true' EXIT
            xcodebuild -project v8ios.xcodeproj -scheme TestRunner -resultBundlePath $TEST_FOLDER/test_results -destination platform\=iOS\ Simulator,OS\=latest,name\=iPhone\ 16\ Pro build test | xcpretty
          on_retry_command: rm -rf $TEST_FOLDER/test_results* && xcrun simctl shutdown all
          new_command_on_retry: |
            bash .github/scripts/sample-hung-app.sh "$TEST_FOLDER/diagnostics" &
            SAMPLER_PID=$!
            trap 'kill "$SAMPLER_PID" 2>/dev/null || true' EXIT
            xcodebuild -project v8ios.xcodeproj -scheme TestRunner -resultBundlePath $TEST_FOLDER/test_results -destination platform\=iOS\ Simulator,OS\=latest,name\=iPhone\ 16\ Pro build test
      # When the runtime suite fails it is almost always because the in-app
      # Jasmine run died before POSTing results (crash or hang). The xcresult is
      # black-box and captures nothing from inside the app, so collect the two
      # things that actually explain it: the native crash report (.ips) and the
      # simulator's unified log (the app's console.log / last spec before a stall).
      # The watchdog in TestRunnerTests.swift prints which artifact to look at.
      - name: Collect crash reports & simulator log (on failure)
        if: ${{ failure() }}
        run: |
          DIAG="$TEST_FOLDER/diagnostics"
          mkdir -p "$DIAG"
          # Simulator app crashes land in the host's DiagnosticReports.
          cp -R ~/Library/Logs/DiagnosticReports/. "$DIAG/DiagnosticReports/" 2>/dev/null || true
          cp -R ~/Library/Logs/CoreSimulator/. "$DIAG/CoreSimulator/" 2>/dev/null || true
          # Unified log = the app's console output (so the last spec before a hang
          # is visible even when nothing was POSTed). `log collect` needs a booted
          # device; don't rely on the `booted` alias (the prior collect failed
          # because the sim wasn't booted at that moment). Resolve a concrete UDID
          # — prefer one already booted from the test run, else the test device,
          # booting it so the persisted log store can be collected.
          UDID="$(xcrun simctl list devices booted | grep -oE '[0-9A-Fa-f-]{36}' | head -1)"
          if [ -z "$UDID" ]; then
            UDID="$(xcrun simctl list devices 'iPhone 16 Pro' | grep -oE '[0-9A-Fa-f-]{36}' | head -1)"
            [ -n "$UDID" ] && xcrun simctl boot "$UDID" 2>/dev/null || true
            [ -n "$UDID" ] && xcrun simctl bootstatus "$UDID" 2>/dev/null || true
          fi
          if [ -n "$UDID" ]; then
            echo "Collecting unified log from simulator $UDID"
            xcrun simctl spawn "$UDID" log collect --output "$DIAG/simulator.logarchive" 2>/dev/null || true
          else
            echo "No simulator UDID resolved; skipping logarchive collection."
          fi
          echo "Collected diagnostics:"; ls -laR "$DIAG" 2>/dev/null || true
      - name: Upload test diagnostics (on failure)
        if: ${{ failure() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-diagnostics
          path: ${{ env.TEST_FOLDER }}/diagnostics
          if-no-files-found: ignore
      - name: Validate Test Results
        run: |
          xcparse attachments $TEST_FOLDER/test_results.xcresult $TEST_FOLDER/test-out
          find $TEST_FOLDER/test-out -name "*junit*.xml" -maxdepth 1 -print0 | xargs -n 1 -0 npx junit-cli-report-viewer
          find $TEST_FOLDER/test-out -name "*junit*.xml" -maxdepth 1 -print0 | xargs -n 1 -0 npx verify-junit-xml
      - name: Archive Test Result Data
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-results
          path: ${{env.TEST_FOLDER}}/test_results.xcresult

  # Publish the xcframework zips + dSYMs as a GitHub Release asset for EVERY
  # version (prerelease unless 'latest'), because the SwiftPM binaryTarget url
  # must resolve for `next`/`pr` consumers too — not only tagged releases.
  github-release:
    name: GitHub Release (SPM assets)
    runs-on: ubuntu-latest
    # Master switch for the SPM release flow. When unset, the workflow runs
    # setup/build/test only — nothing is released or published, so landing this
    # on main before the token is configured is a no-op for consumers.
    if: ${{ vars.ENABLE_SPM_RELEASE == 'true' }}
    permissions:
      contents: write
    needs:
      - setup
      - build
      - test
    env:
      NPM_VERSION: ${{ needs.setup.outputs.npm_version }}
      NPM_TAG: ${{ needs.setup.outputs.npm_tag }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          package-manager-cache: false
      - name: Setup
        run: npm install --no-audit --no-fund
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: spm-artifacts-*
          path: spm-artifacts
          merge-multiple: true
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: dSYMs-*
          path: dist/dSYMs
          merge-multiple: true
      - name: Zip dSYMs
        working-directory: dist/dSYMs
        run: find . -maxdepth 1 -name '*.dSYM' -print | xargs -I@ zip -r @.zip @ || true
      - name: Partial Changelog
        run: npx conventional-changelog -p angular -r2 > body.md
      - name: Create / update release with SPM artifacts
        uses: ncipollo/release-action@b7eabc95ff50cbeeedec83973935c8f306dfcd0b # v1.20.0
        with:
          tag: "v${{ env.NPM_VERSION }}"
          name: "v${{ env.NPM_VERSION }}"
          commit: ${{ github.sha }}
          artifacts: "spm-artifacts/*.xcframework.zip,dist/dSYMs/*.zip"
          bodyFile: "body.md"
          prerelease: ${{ needs.setup.outputs.npm_tag != 'latest' }}
          allowUpdates: true

  # Stamp + tag github.com/NativeScript/ios-spm to point at this release's assets.
  # Cross-repo write uses a short-lived GitHub App installation token, minted per
  # run and scoped to ios-spm only (no long-lived PAT to rotate). Enable by setting
  # repo variable ENABLE_SPM_RELEASE=true plus the App credentials
  # (variable APP_CLIENT_ID + secret APP_PRIVATE_KEY); the App must be installed on
  # NativeScript/ios-spm with Contents: Read and write.
  spm-update:
    name: Update ios-spm manifest
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_SPM_RELEASE == 'true' }}
    needs:
      - setup
      - build
      - test
      - github-release
    env:
      NPM_VERSION: ${{ needs.setup.outputs.npm_version }}
      NPM_TAG: ${{ needs.setup.outputs.npm_tag }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Mint ios-spm App token (short-lived, scoped to ios-spm)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: NativeScript
          repositories: ios-spm
          permission-contents: write
      - name: Checkout ios (for stamping script)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: ios
          persist-credentials: false
      - name: Checkout ios-spm
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: NativeScript/ios-spm
          token: ${{ steps.app-token.outputs.token }}
          path: ios-spm
          persist-credentials: false
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          package-manager-cache: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: spm-artifacts-*
          path: spm-artifacts
          merge-multiple: true
      - name: Generate Package.swift
        # The generator emits the WHOLE manifest, shaped by the checksums it
        # finds: "next" builds produce only checksums-ios.env, so the next
        # manifest omits the visionOS product/targets whose Release assets
        # don't exist (SwiftPM eagerly downloads every binaryTarget in a
        # resolved manifest — an unshipped asset 404s for every consumer).
        # Any non-"next" --channel requires the full checksum set, so a real
        # release can never silently ship an iOS-only manifest.
        run: |
          node ios/scripts/generate-spm-manifest.mjs \
            --package ios-spm/Package.swift \
            --version "$NPM_VERSION" \
            --checksums-dir spm-artifacts \
            --channel "$NPM_TAG"
      - name: Commit and tag ios-spm
        working-directory: ios-spm
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "NativeScript Bot"
          git config user.email "oss@nativescript.org"
          # persist-credentials:false keeps the token out of .git/config; push to a
          # token-authenticated URL instead (the App token is masked in logs).
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/NativeScript/ios-spm.git"
          git add Package.swift
          git commit -m "release: $NPM_VERSION" || echo "no changes to commit"
          git tag -f "$NPM_VERSION"
          git push "$REMOTE" HEAD:main
          git push -f "$REMOTE" "refs/tags/$NPM_VERSION"

  publish:
    name: Publish ${{ matrix.target }}
    runs-on: ubuntu-latest
    environment: npm-publish
    # Gated + ordered after spm-update so a slim package is never published before
    # its matching ios-spm tag exists (which would make it unresolvable).
    if: ${{ vars.ENABLE_SPM_RELEASE == 'true' }}
    needs:
      - setup
      - build
      - test
      - spm-update
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      # Same targets as the build matrix (computed in `setup`): visionos is
      # published only for real releases, never for the "next" channel. The
      # unused `script` key on each entry is harmless here.
      matrix: ${{ fromJSON(needs.setup.outputs.build_matrix) }}
    env:
      NPM_VERSION: ${{ needs.setup.outputs.npm_version }}
      NPM_TAG: ${{ needs.setup.outputs.npm_tag }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          package-manager-cache: false
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package-${{ matrix.target }}
          path: dist
      - name: Update npm (required for OIDC trusted publishing)
        run: |
          corepack enable npm
          corepack install -g npm@11.5.1
          test "$(npm --version)" = "11.5.1"
          test "$(npx --version)" = "11.5.1"
      - name: Resolve package name
        run: |
          if [ "${{ matrix.target }}" = "ios" ]; then echo "PKG=ios" >> $GITHUB_ENV; else echo "PKG=visionos" >> $GITHUB_ENV; fi
      - name: Publish package (OIDC trusted publishing)
        if: ${{ vars.USE_NPM_TOKEN != 'true' }}
        run: |
          echo "Publishing @nativescript/$PKG@$NPM_VERSION to NPM with tag $NPM_TAG via OIDC trusted publishing..."
          unset NODE_AUTH_TOKEN
          if [ -n "${NPM_CONFIG_USERCONFIG:-}" ]; then
            rm -f "$NPM_CONFIG_USERCONFIG"
          fi
          npm publish ./dist/nativescript-${PKG}-${NPM_VERSION}.tgz --tag $NPM_TAG --access public --provenance
        env:
          NODE_AUTH_TOKEN: ""
      - name: Publish package (granular token)
        if: ${{ vars.USE_NPM_TOKEN == 'true' }}
        run: |
          echo "Publishing @nativescript/$PKG@$NPM_VERSION to NPM with tag $NPM_TAG via granular token..."
          npm publish ./dist/nativescript-${PKG}-${NPM_VERSION}.tgz --tag $NPM_TAG --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}

  # Post-publish smoke test: resolve ios-spm at the released tag and verify the
  # binary artifact downloads + checksum-validate against the real Release.
  #
  # One probe for every channel, against the REAL released manifest. The
  # manifest's target set is channel-shaped by generate-spm-manifest.mjs
  # ("next" manifests only declare the iOS targets, because next Releases have
  # no visionos assets), so resolving ios-spm at the released tag exercises
  # exactly the artifact set a consumer's xcodebuild will download: iOS-only on
  # next, iOS + visionos on real releases (v* tag / manual version).
  verify-spm:
    name: Verify SPM resolution
    runs-on: macos-14
    if: ${{ vars.ENABLE_SPM_RELEASE == 'true' }}
    needs:
      - setup
      - spm-update
    env:
      NPM_VERSION: ${{ needs.setup.outputs.npm_version }}
      NPM_TAG: ${{ needs.setup.outputs.npm_tag }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          package-manager-cache: false
      - name: Generate a probe package that depends on ios-spm
        # The probe pins ios-spm at the exact released version. Resolving it
        # takes the same path a consumer's xcodebuild does, and the released
        # manifest only declares targets whose assets exist (channel-shaped by
        # generate-spm-manifest.mjs) — so this single probe is valid for every
        # channel. --assert-release-manifest additionally guards against the
        # tag pointing at a stale (prior version's) manifest, which would
        # still resolve and checksum-pass below.
        run: |
          node scripts/generate-spm-probe.mjs \
            --version "$NPM_VERSION" \
            --dir spmverify \
            --assert-release-manifest
      - name: Resolve (downloads the xcframework zips and verifies their checksums)
        working-directory: spmverify
        run: |
          # Resolution fetches each binaryTarget's zip and verifies its SHA-256
          # against the manifest checksum; a mismatch or a missing release asset
          # fails the release here. For next the manifest declares the iOS
          # artifacts only; real releases also declare (and verify) visionos.
          swift package resolve
          echo "ios-spm@$NPM_VERSION resolved and checksum-verified."
